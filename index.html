<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Daily Fitness Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&family=Noto+Sans+JP:wght@400;700&display=swap');

    :root {
      /* Color Palette based on dark/glass aesthetic */
      --bg-color: #0f111a;
      --glass-bg: rgba(26, 29, 41, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent: #ef4444; /* Red accent similar to mock */
      --accent-hover: #dc2626;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --rest-color: #3b82f6;
      
      --safe-top: env(safe-area-inset-top, 20px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: var(--bg-color);
      /* Subtle background gradient to enhance glass effect */
      background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f111a 70%);
      color: var(--text-main);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* -------------------------------------
       View Management
       ------------------------------------- */
    .view {
      display: none;
      width: 100%;
      height: 100%;
      max-width: 1200px;
      flex-direction: column;
      overflow-y: auto;
    }
    .view.active { display: flex; }

    /* -------------------------------------
       Guide View (Dashboard)
       ------------------------------------- */
    #view-guide { padding: calc(40px + var(--safe-top)) 5% 40px; }
    
    .guide-header { text-align: center; margin-bottom: 40px; }
    .guide-header h1 { font-size: 28px; font-weight: 700; letter-spacing: 2px; }
    .guide-header p { color: var(--text-muted); margin-top: 8px; font-size: 14px; }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding-bottom: var(--safe-bottom);
    }

    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    
    .card-tag { display: inline-block; padding: 4px 8px; background: rgba(255,255,255,0.1); border-radius: 4px; font-size: 12px; color: var(--text-muted); margin-bottom: 12px; align-self: flex-start; }
    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
    .card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; flex-grow: 1; margin-bottom: 20px; }
    
    .btn-quick-start {
      background: var(--text-main);
      color: var(--bg-color);
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    .btn-quick-start:hover { background: #cbd5e1; }

    /* -------------------------------------
       Timer View
       ------------------------------------- */
    #view-timer {
      padding: var(--safe-top) 20px var(--safe-bottom);
      justify-content: space-between;
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
    }
    .btn-back {
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.2); }
    .top-title { font-weight: 700; letter-spacing: 2px; color: var(--text-muted); font-size: 14px; }
    .top-spacer { width: 70px; } /* Balance flex */

    /* Center Timer */
    .timer-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .timer-info { text-align: center; margin-bottom: 20px; z-index: 2; }
    .phase-text { font-size: 16px; letter-spacing: 4px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
    .phase-text.rest { color: var(--rest-color); }
    .exercise-text { font-size: 24px; font-weight: 700; }

    .time-display {
      font-family: 'Roboto Mono', monospace;
      font-size: 120px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -4px;
      z-index: 2;
    }

    /* SVG Ring Background */
    .ring-svg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      z-index: 0;
      opacity: 0.15;
    }
    .ring-track { fill: none; stroke: #ffffff; stroke-width: 4; }
    .ring-fill {
      fill: none;
      stroke: var(--accent);
      stroke-width: 8;
      stroke-linecap: round;
      transform-origin: center;
      transform: rotate(-90deg) scale(1, -1);
      transition: stroke-dashoffset 1s linear, stroke 0.3s;
    }
    .ring-fill.rest { stroke: var(--rest-color); }

    /* Bottom Section */
    .bottom-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 30px;
      padding-bottom: 20px;
    }

    .next-info {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* Controls (PAUSE, RESET, SETTINGS equivalents) */
    .controls {
      display: flex;
      justify-content: center;
      gap: 16px;
    }
    .btn-control {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
    }
    .btn-control:hover { background: rgba(255,255,255,0.1); }
    .btn-control.primary { background: var(--accent); border-color: var(--accent); }
    .btn-control.primary:hover { background: var(--accent-hover); }

    /* Progress Dots */
    .progress-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      width: 100%;
    }
    .dot {
      flex: 1;
      max-width: 30px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      transition: background 0.3s;
    }
    .dot.done { background: var(--text-main); }
    .dot.active { background: var(--accent); }
    .dot.active.rest { background: var(--rest-color); }

    /* Responsive */
    @media (max-width: 768px) {
      .time-display { font-size: 80px; }
      .ring-svg { width: 280px; height: 280px; }
      .controls { flex-wrap: wrap; }
      .btn-control { padding: 12px 16px; flex: 1; justify-content: center; }
    }
  </style>
</head>
<body>

<div id="view-guide" class="view active">
  <div class="guide-header">
    <h1>FITNESS ROUTINE</h1>
    <p>ITプロフェッショナルのための効率的な体調管理</p>
  </div>

  <div class="grid-container" id="routineGrid">
    </div>
</div>

<div id="view-timer" class="view">
  <div class="top-bar">
    <button class="btn-back" id="btnBack">← BACK</button>
    <div class="top-title" id="routineTitle">STRETCH TIMER</div>
    <div class="top-spacer"></div>
  </div>

  <div class="timer-center">
    <svg class="ring-svg" viewBox="0 0 400 400">
      <circle class="ring-track" cx="200" cy="200" r="190"/>
      <circle class="ring-fill" id="ringFill" cx="200" cy="200" r="190"/>
    </svg>
    
    <div class="timer-info">
      <div class="phase-text" id="phaseText">WORKOUT</div>
      <div class="exercise-text" id="exerciseText">胸と脇のストレッチ</div>
    </div>
    
    <div class="time-display" id="timeDisplay">00:30</div>
  </div>

  <div class="bottom-section">
    <div class="next-info" id="nextInfo">NEXT SESSION: 内もものストレッチ</div>
    
    <div class="controls">
      <button class="btn-control" id="btnReset">↻ RESET</button>
      <button class="btn-control primary" id="btnPlay">⏸ PAUSE</button>
      <button class="btn-control" id="btnSkip">⏭ SKIP</button>
    </div>

    <div class="progress-dots" id="progressDots">
      </div>
  </div>
</div>

<script>
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // データ定義 (ROUTINE_CONFIGS)
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const ROUTINE_CONFIGS = {
    'morning-5': {
      title: '🌞 5 MIN MORNING',
      desc: '時間がない日のための最短ルーティン。体温を上げ、自律神経をスイッチさせます。',
      tag: '5分 / 朝',
      exercises: [
        { name: '深呼吸・背伸び', work: 30, rest: 5 },
        { name: '首のストレッチ（左右）', work: 30, rest: 5 },
        { name: '肩甲骨を寄せる・広げる', work: 30, rest: 5 },
        { name: '体側伸ばし（左右）', work: 30, rest: 5 },
        { name: '前屈・背面伸ばし', work: 30, rest: 5 },
        { name: '股関節回し', work: 30, rest: 5 },
        { name: 'アキレス腱伸ばし', work: 30, rest: 5 },
        { name: '全身リラックス', work: 30, rest: 0 }
      ]
    },
    'morning-10': {
      title: '☀️ 10 MIN MORNING',
      desc: '骨盤や肩甲骨を重点的にほぐす中級者向け。デスクワーク前の準備に最適。',
      tag: '10分 / 全身',
      exercises: [
        { name: '背伸び深呼吸', work: 45, rest: 10 },
        { name: '首回し', work: 45, rest: 10 },
        { name: '肩甲骨の上下運動', work: 45, rest: 10 },
        { name: '胸を開くストレッチ', work: 45, rest: 10 },
        { name: '体幹のねじり', work: 45, rest: 10 },
        { name: '太もも前側のストレッチ', work: 45, rest: 10 },
        { name: 'ハムストリングスのストレッチ', work: 45, rest: 10 },
        { name: '股関節を開く', work: 45, rest: 10 },
        { name: '足首回し・手首回し', work: 45, rest: 0 }
      ]
    },
    'night-9': {
      title: '🌙 9 MIN DEEP SLEEP',
      desc: '副交感神経を優位にし、深部体温を下げることで入眠をスムーズにします。布団の上で。',
      tag: '9分 / 睡眠改善',
      exercises: [
        { name: '胸と脇のストレッチ', work: 30, rest: 8 },
        { name: '内もものストレッチ（カエル足）', work: 30, rest: 8 },
        { name: '腰と背中のストレッチ', work: 30, rest: 8 },
        { name: '股関節のストレッチ（右）', work: 30, rest: 8 },
        { name: '背骨のねじり（右）', work: 30, rest: 8 },
        { name: '股関節のストレッチ（左）', work: 30, rest: 8 },
        { name: '背骨のねじり（左）', work: 30, rest: 8 },
        { name: '骨盤の調整', work: 30, rest: 8 },
        { name: 'ふくらはぎのほぐし', work: 60, rest: 8 },
        { name: '仕上げの深呼吸・リラックス', work: 120, rest: 0 }
      ]
    },
    'ab-roller': {
      title: '💪 AB ROLLER (KNEE)',
      desc: '正しい姿勢を維持し、腰を痛めないための骨盤の角度と呼吸法を意識した3セット。',
      tag: 'インターバル / 筋トレ',
      exercises: [
        { name: 'セット 1 (限界まで)', work: 30, rest: 60 },
        { name: 'セット 2 (限界まで)', work: 30, rest: 60 },
        { name: 'セット 3 (限界まで)', work: 30, rest: 0 }
      ]
    }
  };

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 初期化と画面切り替え
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const viewGuide = document.getElementById('view-guide');
  const viewTimer = document.getElementById('view-timer');
  const gridContainer = document.getElementById('routineGrid');

  // ガイド画面のカード生成
  Object.keys(ROUTINE_CONFIGS).forEach(key => {
    const config = ROUTINE_CONFIGS[key];
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <span class="card-tag">${config.tag}</span>
      <h2 class="card-title">${config.title}</h2>
      <p class="card-desc">${config.desc}</p>
      <button class="btn-quick-start" onclick="startRoutine('${key}')">▶ Quick Start</button>
    `;
    gridContainer.appendChild(card);
  });

  let currentExercises = [];
  let currentTotal = 0;

  function switchToTimer() {
    viewGuide.classList.remove('active');
    viewTimer.classList.add('active');
  }

  function switchToGuide() {
    pause();
    viewTimer.classList.remove('active');
    viewGuide.classList.add('active');
  }

  document.getElementById('btnBack').addEventListener('click', switchToGuide);

  function startRoutine(key) {
    const config = ROUTINE_CONFIGS[key];
    currentExercises = config.exercises;
    currentTotal = currentExercises.length;
    document.getElementById('routineTitle').textContent = config.title;
    
    buildDots();
    loadExercise(0, 'work');
    switchToTimer();
    start(); // 自動スタート
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // タイマーロジック
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━
  let idx = 0;
  let phase = 'work';
  let remaining = 0;
  let running = false;
  let timerInterval = null;

  const R = 190;
  const CIRC = 2 * Math.PI * R;
  const ringFill = document.getElementById('ringFill');
  ringFill.style.strokeDasharray = CIRC;

  // DOM Elements
  const elTime = document.getElementById('timeDisplay');
  const elPhase = document.getElementById('phaseText');
  const elName = document.getElementById('exerciseText');
  const elNext = document.getElementById('nextInfo');
  const elPlay = document.getElementById('btnPlay');
  const elDots = document.getElementById('progressDots');

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
    const s = (seconds % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  function buildDots() {
    elDots.innerHTML = '';
    for (let i = 0; i < currentTotal; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      d.id = `dot-${i}`;
      elDots.appendChild(d);
    }
  }

  function updateDots() {
    for (let i = 0; i < currentTotal; i++) {
      const d = document.getElementById(`dot-${i}`);
      if(!d) continue;
      d.className = 'dot';
      if (i < idx) d.classList.add('done');
      else if (i === idx) {
        d.classList.add('active');
        if (phase === 'rest') d.classList.add('rest');
      }
    }
  }

  function updateUI() {
    if (currentExercises.length === 0) return;
    const ex = currentExercises[idx];
    const totalPhaseTime = (phase === 'work') ? ex.work : ex.rest;

    elTime.textContent = formatTime(remaining);
    elName.textContent = ex.name;
    elPhase.textContent = phase === 'work' ? 'WORKOUT' : 'REST';
    elPhase.className = 'phase-text' + (phase === 'rest' ? ' rest' : '');
    ringFill.className = 'ring-fill' + (phase === 'rest' ? ' rest' : '');
    
    elPlay.innerHTML = running ? '⏸ PAUSE' : '▶ RESUME';

    const fraction = totalPhaseTime > 0 ? (remaining / totalPhaseTime) : 0;
    ringFill.style.strokeDashoffset = CIRC * (1 - fraction);

    if (idx < currentTotal - 1 && phase === 'work') {
      elNext.textContent = `NEXT: ${currentExercises[idx + 1].name}`;
    } else if (phase === 'rest') {
      elNext.textContent = `UP NEXT: ${currentExercises[idx].name} (完了後)`;
    } else {
      elNext.textContent = 'SESSION COMPLETE PENDING...';
    }
    updateDots();
  }

  function loadExercise(i, ph = 'work') {
    idx = i;
    phase = ph;
    const ex = currentExercises[i];
    remaining = (ph === 'work') ? ex.work : ex.rest;
    updateUI();
  }

  function tick() {
    remaining--;
    if (remaining <= 3 && remaining > 0) soundCountdown();
    if (remaining <= 0) { handlePhaseEnd(); return; }
    updateUI();
  }

  function handlePhaseEnd() {
    const ex = currentExercises[idx];
    if (phase === 'work') {
      if (idx === currentTotal - 1) { finish(); return; }
      if (ex.rest > 0) {
        phase = 'rest'; remaining = ex.rest;
        soundRest();
      } else {
        idx++; phase = 'work'; remaining = currentExercises[idx].work;
        soundStart();
      }
    } else {
      idx++; phase = 'work'; remaining = currentExercises[idx].work;
      soundStart();
    }
    updateUI();
  }

  function start() {
    if (running || currentExercises.length === 0) return;
    getAudioCtx(); // Wake Audio API
    requestWakeLock();
    running = true;
    timerInterval = setInterval(tick, 1000);
    updateUI();
  }

  function pause() {
    running = false;
    clearInterval(timerInterval);
    updateUI();
  }

  function reset() {
    pause();
    loadExercise(0, 'work');
  }

  function finish() {
    pause();
    soundFinish();
    elTime.textContent = "DONE";
    elPhase.textContent = "COMPLETED";
    elName.textContent = "お疲れさまでした！";
    elNext.textContent = "";
    ringFill.style.strokeDashoffset = 0;
  }

  // ボタンイベント
  elPlay.addEventListener('click', () => running ? pause() : start());
  document.getElementById('btnReset').addEventListener('click', reset);
  document.getElementById('btnSkip').addEventListener('click', () => {
    pause();
    if (idx < currentTotal - 1) {
      loadExercise(idx + 1, 'work');
      start();
    } else {
      finish();
    }
  });

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // オーディオ & WakeLock (デバイス制御)
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function beep(freq, dur, vol = 0.1) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }
  function soundStart()  { beep(880, 0.15); }
  function soundRest()   { beep(440, 0.3); }
  function soundFinish() { beep(660, 0.1); setTimeout(()=>beep(880,0.2), 120); setTimeout(()=>beep(1100,0.4),260); }
  function soundCountdown() { beep(660, 0.1, 0.05); }

  let wakeLock = null;
  async function requestWakeLock() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
</script>
</body>
</html>
