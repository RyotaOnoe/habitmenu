<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Fitness Timer</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #2c3e50;
            --card-bg: #ffffff;
            --theme-color: #3498db; /* 動的に変更されます */
            --danger-color: #e74c3c;
            --gray-color: #95a5a6;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        h1 {
            font-size: 1.2rem;
            margin: 0 0 15px 0;
            color: var(--text-color);
        }

        select {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid var(--theme-color);
            border-radius: 8px;
            background-color: #fff;
            color: var(--text-color);
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .video-link {
            display: inline-block;
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--theme-color);
            text-decoration: none;
            font-weight: bold;
        }
        
        .video-link:hover {
            text-decoration: underline;
        }

        .timer-display {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        .exercise-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            min-height: 2.4em;
        }

        .next-exercise {
            font-size: 0.9rem;
            color: var(--gray-color);
            margin-bottom: 30px;
            min-height: 1.2em;
        }

        .circle-timer {
            position: relative;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: conic-gradient(var(--theme-color) 0%, #eee 0%);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: background 0.1s linear;
        }

        .circle-inner {
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background-color: var(--card-bg);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .time {
            font-size: 4.5rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            color: var(--text-color);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background-color: var(--theme-color);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.1s, background-color 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:active {
            transform: scale(0.95);
        }

        button.secondary {
            background-color: var(--gray-color);
            width: 50px;
            height: 50px;
            margin-top: 5px;
        }

        .progress-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            flex-wrap: wrap;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #eee;
            transition: background-color 0.3s;
        }

        .dot.active {
            background-color: var(--theme-color);
            transform: scale(1.2);
        }

        .dot.completed {
            background-color: var(--theme-color);
            opacity: 0.5;
        }

        .safety-box {
            margin: 20px;
            padding: 15px;
            border-radius: 8px;
            background-color: #fdf2f2;
            border: 1px solid #f5c6cb;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #721c24;
        }

        .safety-box span {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Daily Fitness Timer</h1>
        <select id="courseSelect">
            <option value="morning5">☀️ 朝のストレッチ (5分)</option>
            <option value="morning10">☀️ 朝のストレッチ (10分)</option>
            <option value="night9">🌙 夜の熟睡ストレッチ (9分)</option>
            <option value="abroller">🔥 腹筋ローラー (膝コロ3セット)</option>
        </select>
        <a id="videoLink" class="video-link" href="#" target="_blank" rel="noopener noreferrer">📺 参考動画を開く</a>
    </header>

    <div class="progress-container" id="progressDots">
        </div>

    <div class="timer-display">
        <div class="exercise-name" id="exerciseName">準備</div>
        <div class="next-exercise" id="nextExercise">Next: ---</div>
        
        <div class="circle-timer" id="circleTimer">
            <div class="circle-inner">
                <div class="time" id="timeDisplay">00:00</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn" class="secondary">⏮</button>
        <button id="playBtn">▶️</button>
        <button id="nextBtn" class="secondary">⏭</button>
    </div>

    <div class="safety-box" id="safetyBox">
        <span>⚠️ 重要な安全上の注意</span>
        <div id="safetyText">起き抜けは体が脱水状態で硬いため、決して反動をつけず、痛気持ちいい程度で止めてください。</div>
    </div>
</div>

<script>
    // コースデータ定義
    const courses = {
        morning5: {
            themeColor: '#f1c40f',
            videoUrl: 'https://www.youtube.com/watch?v=gMIlRS_lbYA',
            safety: '起き抜けは体が脱水状態で硬いため、決して反動をつけず、痛気持ちいい程度で止めてください。呼吸を止めないように！',
            exercises: [
                { name: "準備・深呼吸", duration: 30 },
                { name: "首のストレッチ", duration: 60 },
                { name: "肩回し・肩甲骨", duration: 60 },
                { name: "体側（脇腹）伸ばし", duration: 60 },
                { name: "軽い前屈・後屈", duration: 60 },
                { name: "深呼吸・クールダウン", duration: 30 }
            ]
        },
        morning10: {
            themeColor: '#e67e22',
            videoUrl: 'https://www.youtube.com/watch?v=2EfFlQev4rg',
            safety: '骨盤や肩甲骨を重点的にほぐします。痛みを感じる手前でキープし、深く呼吸を続けてください。',
            exercises: [
                { name: "準備・深呼吸", duration: 60 },
                { name: "首・肩の入念なストレッチ", duration: 120 },
                { name: "肩甲骨ほぐし", duration: 120 },
                { name: "股関節ストレッチ", duration: 120 },
                { name: "ふくらはぎ・アキレス腱", duration: 120 },
                { name: "全身の背伸び・深呼吸", duration: 60 }
            ]
        },
        night9: {
            themeColor: '#9b59b6',
            videoUrl: 'https://www.youtube.com/watch?v=09C7ti0xY4k',
            safety: '副交感神経を優位にするため、ゆったりとした呼吸を意識してください。布団の上でも可能です。',
            exercises: [
                { name: "リラックス・深呼吸", duration: 60 },
                { name: "首の静的ストレッチ", duration: 120 },
                { name: "胸を開くストレッチ", duration: 120 },
                { name: "腰・お尻のストレッチ", duration: 120 },
                { name: "太もも裏のストレッチ", duration: 120 }
            ]
        },
        abroller: {
            themeColor: '#e74c3c',
            videoUrl: 'https://www.youtube.com/watch?v=RpSTzuMXgFE',
            safety: '【鉄則】腰を反らさない・立ちコロから始めない。筋肉痛がある時は必ず休んでください。',
            exercises: [
                { name: "フォーム確認・準備", duration: 30 },
                { name: "セット1 (5〜10回)", duration: 45 },
                { name: "休憩 (インターバル)", duration: 60 },
                { name: "セット2 (5〜10回)", duration: 45 },
                { name: "休憩 (インターバル)", duration: 60 },
                { name: "セット3 (5〜10回)", duration: 45 }
            ]
        }
    };

    // 状態管理
    let currentCourseId = 'morning5';
    let currentStepIndex = 0;
    let timeLeft = 0;
    let totalTime = 0;
    let timerInterval = null;
    let isPlaying = false;

    // DOM要素
    const courseSelect = document.getElementById('courseSelect');
    const videoLink = document.getElementById('videoLink');
    const exerciseName = document.getElementById('exerciseName');
    const nextExercise = document.getElementById('nextExercise');
    const timeDisplay = document.getElementById('timeDisplay');
    const circleTimer = document.getElementById('circleTimer');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressDots = document.getElementById('progressDots');
    const safetyText = document.getElementById('safetyText');

    // 初期化
    function init() {
        courseSelect.addEventListener('change', (e) => {
            currentCourseId = e.target.value;
            loadCourse();
        });

        playBtn.addEventListener('click', toggleTimer);
        nextBtn.addEventListener('click', skipNext);
        prevBtn.addEventListener('click', skipPrev);

        loadCourse();
    }

    // コース読み込み
    function loadCourse() {
        clearInterval(timerInterval);
        isPlaying = false;
        playBtn.textContent = '▶️';
        currentStepIndex = 0;

        const course = courses[currentCourseId];
        document.documentElement.style.setProperty('--theme-color', course.themeColor);
        videoLink.href = course.videoUrl;
        safetyText.textContent = course.safety;

        renderDots();
        loadStep();
    }

    // ドットの描画
    function renderDots() {
        const course = courses[currentCourseId];
        progressDots.innerHTML = '';
        course.exercises.forEach((_, index) => {
            const dot = document.createElement('div');
            dot.className = 'dot';
            if (index === currentStepIndex) dot.classList.add('active');
            progressDots.appendChild(dot);
        });
    }

    // ドットの状態更新
    function updateDots() {
        const dots = progressDots.querySelectorAll('.dot');
        dots.forEach((dot, index) => {
            dot.className = 'dot'; // reset
            if (index < currentStepIndex) dot.classList.add('completed');
            if (index === currentStepIndex) dot.classList.add('active');
        });
    }

    // ステップの読み込み
    function loadStep() {
        const course = courses[currentCourseId];
        const step = course.exercises[currentStepIndex];
        
        exerciseName.textContent = step.name;
        timeLeft = step.duration;
        totalTime = step.duration;
        
        if (currentStepIndex < course.exercises.length - 1) {
            nextExercise.textContent = `Next: ${course.exercises[currentStepIndex + 1].name}`;
        } else {
            nextExercise.textContent = "Next: 終了 🎉";
        }

        updateDots();
        updateDisplay();
    }

    // 表示の更新
    function updateDisplay() {
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        timeDisplay.textContent = `${m}:${s}`;

        // 円形プログレスバーの更新
        const percentage = ((totalTime - timeLeft) / totalTime) * 100;
        circleTimer.style.background = `conic-gradient(var(--theme-color) ${percentage}%, #eee ${percentage}%)`;
    }

    // タイマーのON/OFF
    function toggleTimer() {
        if (isPlaying) {
            clearInterval(timerInterval);
            playBtn.textContent = '▶️';
        } else {
            timerInterval = setInterval(tick, 1000);
            playBtn.textContent = '⏸';
        }
        isPlaying = !isPlaying;
    }

    // 1秒ごとの処理
    function tick() {
        if (timeLeft > 0) {
            timeLeft--;
            updateDisplay();
        } else {
            // ステップ完了
            clearInterval(timerInterval);
            isPlaying = false;
            playBtn.textContent = '▶️';
            
            const course = courses[currentCourseId];
            if (currentStepIndex < course.exercises.length - 1) {
                currentStepIndex++;
                loadStep();
                // 自動で次のステップを開始
                toggleTimer();
            } else {
                exerciseName.textContent = "お疲れ様でした！✨";
                timeDisplay.textContent = "00:00";
                circleTimer.style.background = `conic-gradient(var(--theme-color) 100%, #eee 100%)`;
            }
        }
    }

    // 次へスキップ
    function skipNext() {
        const course = courses[currentCourseId];
        if (currentStepIndex < course.exercises.length - 1) {
            currentStepIndex++;
            loadStep();
            if (isPlaying) {
                clearInterval(timerInterval);
                isPlaying = false;
                toggleTimer();
            }
        }
    }

    // 前へスキップ
    function skipPrev() {
        if (currentStepIndex > 0) {
            currentStepIndex--;
            loadStep();
            if (isPlaying) {
                clearInterval(timerInterval);
                isPlaying = false;
                toggleTimer();
            }
        }
    }

    // 起動
    init();
</script>

</body>
</html>
